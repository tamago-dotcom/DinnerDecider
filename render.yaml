services:
  - type: web
    name: dinner-decider
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: /var/data/dinner.db
    disk:
      name: dinner-data
      mountPath: /var/data
      sizeGB: 1
