<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}気分メシ！{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <!-- PWA -->
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="気分メシ！">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.svg') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <a href="{{ url_for('index') }}" class="site-logo">🍽️ 気分メシ！</a>
    <nav>
      <a href="{{ url_for('history') }}" class="nav-link">📋 履歴</a>
    </nav>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>気分メシ！ &copy; 2026</p>
  </footer>

  {% block scripts %}{% endblock %}
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
